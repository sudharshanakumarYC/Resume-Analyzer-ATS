<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Results</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    position:relative;
    overflow-x:hidden;
    background:linear-gradient(120deg,#fff8e1,#ffecb3,#ffd54f,#ffecb3,#fff8e1);
    background-size:400% 400%;
    animation:gradientFlow 12s ease infinite;
    color:#4e3b0f;
    min-height:100vh;
    padding:40px;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:-30%;
    width:60%;
    height:100%;
    background:radial-gradient(circle,rgba(255,255,255,0.55),transparent 70%);
    filter:blur(40px);
    animation:glowMove 9s ease-in-out infinite;
    pointer-events:none;
    z-index:0;
}

@keyframes gradientFlow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

@keyframes glowMove{
    0%{left:-30%;}
    50%{left:100%;}
    100%{left:-30%;}
}

h1{
    position:relative;
    z-index:1;
    text-align:center;
    margin-bottom:30px;
    color:#b8860b;
}

.container{
    position:relative;
    z-index:1;
    max-width:900px;
    margin:auto;
}

.card{
    background:#fffdf5;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid #ffe082;
    box-shadow:0px 4px 12px rgba(255,193,7,0.2);
}

.rank{
    font-size:22px;
    font-weight:bold;
    color:#b8860b;
}

.filename{
    font-size:18px;
    color:#4e3b0f;
}

.score{
    color:#ef6c00;
    font-size:20px;
    font-weight:bold;
}

.button{
    display:block;
    width:250px;
    margin:30px auto;
    text-align:center;
    text-decoration:none;
    background:linear-gradient(135deg,#ffca28,#ffa000);
    padding:15px;
    border-radius:10px;
    color:#3b2a00;
    font-weight:bold;
    transition:transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    box-shadow:0px 4px 10px rgba(255,160,0,0.3);
}

.button:hover{
    background:linear-gradient(135deg,#ffb300,#ff8f00);
    transform:scale(1.04) translateY(-4px);
    box-shadow:0px 10px 20px rgba(255,160,0,0.5);
}

.button:active{
    transform:scale(0.98) translateY(0px);
}


</style>

</head>

<body>

<h1>Requirment Matched Resumes</h1>

<div class="container">

{% for file, score in results %}

<div class="card">

<div>

<div class="rank">

{% if loop.index == 1 %}

{% elif loop.index == 2 %}

{% elif loop.index == 3 %}

{% else %}
#{{loop.index}}
{% endif %}

</div>

<div class="filename">
{{file}}
</div>

</div>

<div class="score">
{{score}}%
</div>

</div>

{% endfor %}

<a href="/" class="button">
  Analyze Again
</a>

</div>

</body>
</html>
